<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>消息列表 - ZuFang</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --green:#07c160;
  --green-light:#e8f9ee;
  --blue:#2563eb;
  --text-1:#111827;
  --text-2:#6b7280;
  --text-3:#9ca3af;
  --bg:#f5f5f5;
  --white:#fff;
  --border:#f0f0f0;
  --red:#ef4444;
  --radius:12px;
  --shadow:0 2px 12px rgba(0,0,0,0.07);
}

body{
  font-family:'Noto Sans SC',-apple-system,sans-serif;
  background:#d0d3d9;
  display:flex;justify-content:center;align-items:flex-start;
  min-height:100vh;padding:32px 0;
}

/* ── Phone Shell ── */
.phone{
  width:375px;min-height:812px;
  background:var(--bg);
  border-radius:44px;
  box-shadow:0 24px 80px rgba(0,0,0,0.25),0 0 0 1.5px rgba(0,0,0,0.12);
  overflow:hidden;
  display:flex;flex-direction:column;
  position:relative;
}

/* ── Status Bar ── */
.status{
  height:44px;background:var(--white);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px 0 16px;flex-shrink:0;
}
.status-time{font-size:15px;font-weight:600;color:var(--text-1)}
.status-icons{display:flex;align-items:center;gap:5px}
.status-icons svg{width:15px;height:15px;fill:var(--text-1)}

/* ── NavBar ── */
.navbar{
  height:48px;background:var(--white);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.nav-title{font-size:17px;font-weight:700;color:var(--text-1)}
.nav-icon{
  width:32px;height:32px;
  display:flex;align-items:center;justify-content:center;
  border-radius:50%;cursor:pointer;
  transition:background .15s;
}
.nav-icon:hover{background:#f3f4f6}
.nav-icon svg{width:20px;height:20px;stroke:var(--text-1);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
/* Capsule */
.capsule{
  display:flex;align-items:center;gap:0;
  border:1px solid #d1d5db;border-radius:16px;overflow:hidden;
  height:32px;
}
.capsule-btn{
  width:44px;height:32px;
  display:flex;align-items:center;justify-content:center;
  background:transparent;border:none;cursor:pointer;
}
.capsule-btn svg{width:15px;height:15px;stroke:#6b7280;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.capsule-divider{width:1px;height:18px;background:#d1d5db;flex-shrink:0}

/* ── Search ── */
.search-bar{
  padding:8px 16px 10px;
  background:var(--white);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.search-inner{
  display:flex;align-items:center;gap:8px;
  background:#f3f4f6;
  border-radius:20px;
  padding:0 14px;
  height:36px;
}
.search-inner svg{width:15px;height:15px;stroke:#9ca3af;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.search-inner input{
  flex:1;border:none;outline:none;background:transparent;
  font-size:14px;color:var(--text-1);font-family:inherit;
}
.search-inner input::placeholder{color:var(--text-3)}

/* ── List Scroll ── */
.list-scroll{
  flex:1;overflow-y:auto;
  background:var(--white);
}
.list-scroll::-webkit-scrollbar{display:none}

/* ── Chat Item ── */
.chat-item{
  display:flex;align-items:flex-start;
  gap:12px;
  padding:14px 16px;
  position:relative;
  cursor:pointer;
  transition:background .15s;
  animation:fadeIn .3s ease both;
}
.chat-item:hover{background:#fafafa}
.chat-item:active{background:#f3f4f6}
.chat-item + .chat-item::before{
  content:'';
  position:absolute;top:0;left:68px;right:0;
  height:1px;background:var(--border);
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(6px)}
  to{opacity:1;transform:translateY(0)}
}
.chat-item:nth-child(1){animation-delay:.05s}
.chat-item:nth-child(2){animation-delay:.1s}
.chat-item:nth-child(3){animation-delay:.15s}
.chat-item:nth-child(4){animation-delay:.2s}

/* Avatar */
.avatar-wrap{position:relative;flex-shrink:0}
.avatar{
  width:48px;height:48px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:700;color:var(--white);
  letter-spacing:0;
  overflow:hidden;
}
.avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}

/* Unread Badge */
.badge{
  position:absolute;top:-4px;right:-4px;
  min-width:18px;height:18px;
  background:var(--red);
  border-radius:9px;
  border:2px solid var(--white);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:var(--white);
  padding:0 4px;
  line-height:1;
}

/* Main */
.chat-main{flex:1;min-width:0;display:flex;flex-direction:column;gap:6px}

.chat-row1{display:flex;align-items:center;justify-content:space-between;gap:8px}
.chat-name{font-size:16px;font-weight:600;color:var(--text-1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px}
.chat-time{font-size:12px;color:var(--text-3);white-space:nowrap;flex-shrink:0}

/* House Preview Card */
.house-card{
  display:flex;align-items:center;gap:8px;
  background:#f9fafb;
  border:1px solid #f0f0f0;
  border-radius:8px;
  padding:7px 9px;
  overflow:hidden;
}
.house-thumb{
  width:44px;height:44px;border-radius:6px;
  background:linear-gradient(135deg,#e2e8f0,#cbd5e1);
  flex-shrink:0;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.house-thumb svg{width:18px;height:18px;stroke:#94a3b8;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.house-thumb img{width:100%;height:100%;object-fit:cover}
.house-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.house-name{font-size:13px;font-weight:600;color:var(--text-1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.house-meta{font-size:11px;color:var(--text-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.house-price{font-size:13px;font-weight:700;color:var(--green);white-space:nowrap;flex-shrink:0}

/* Last Message */
.chat-preview{
  font-size:13px;color:var(--text-2);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.chat-preview .label{
  display:inline-block;
  background:#f0fdf4;color:var(--green);
  font-size:11px;font-weight:600;
  padding:1px 6px;border-radius:4px;
  margin-right:5px;
}
.chat-preview .img-label{
  display:inline-flex;align-items:center;gap:3px;
  color:var(--text-3);font-size:12px;
}
.chat-preview .img-label svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2}

/* Muted */
.muted-icon{
  flex-shrink:0;
  width:16px;height:16px;
  display:flex;align-items:center;justify-content:center;
}
.muted-icon svg{width:14px;height:14px;stroke:var(--text-3);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* ── Section Header ── */
.section-header{
  padding:10px 16px 6px;
  font-size:12px;font-weight:600;color:var(--text-3);
  letter-spacing:.5px;
  background:var(--bg);
  text-transform:uppercase;
}

/* ── Tab Bar ── */
.tabbar{
  height:56px;background:var(--white);
  border-top:1px solid var(--border);
  display:flex;align-items:center;
  flex-shrink:0;
  padding-bottom:4px;
}
.tab{
  flex:1;height:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;cursor:pointer;
  transition:opacity .15s;
  position:relative;
}
.tab svg{width:22px;height:22px;stroke:var(--text-3);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;transition:stroke .15s}
.tab span{font-size:10px;color:var(--text-3);transition:color .15s;font-weight:500}
.tab.active svg{stroke:var(--green)}
.tab.active span{color:var(--green);font-weight:700}
.tab-badge{
  position:absolute;top:6px;right:calc(50% - 18px);
  width:8px;height:8px;
  background:var(--red);border-radius:50%;
  border:1.5px solid var(--white);
}
</style>
</head>
